<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Guess Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>⚡ Neon Guess Battle</h1>

    <div class="status">
      <p id="statusText">Press Start to Play</p>
      <p id="scoreText">Player: 0 | Computer: 0</p>
    </div>

    <button id="startBtn" onclick="startGame()">Start Game</button>
    <button id="restartBtn" onclick="restartGame()" style="display:none;">Restart</button>

    <div class="game-area">
      <p class="hint">Pick a number (1–5)</p>

      <div id="buttons" class="buttons">
        <button onclick="playRound(1)">1</button>
        <button onclick="playRound(2)">2</button>
        <button onclick="playRound(3)">3</button>
        <button onclick="playRound(4)">4</button>
        <button onclick="playRound(5)">5</button>
      </div>

      <div id="result" class="result">Game not started</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
